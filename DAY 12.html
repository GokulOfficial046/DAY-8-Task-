<!DOCTYPE html>
<html>
<head>
    <title>CSS Styling Example</title>

    <style>
        
        .colors {
            color: blue;               
            border: 2px solid red;    
            padding: 10px;
        }

        
        .backgrounds {
            background-color: lightyellow;  
            background-image: url('https://via.placeholder.com/150');
            background-repeat: no-repeat;
            padding: 20px;
        }


        .fonts {
            font-family: Arial, sans-serif; 
            font-size: 20px;                
        }

        
        .text-styles {
            font-weight: bold;      
            font-style: italic;    
            text-decoration: underline; 
        }
    </style>

</head>
<body>

    <h2 class="colors">This is Colors Example</h2>

    <div class="backgrounds">
        This section shows background color and image.
    </div>

    <p class="fonts">
        This text uses different font family and size.
    </p>

    <p class="text-styles">
        This text is bold, italic, and underlined.
    </p>

</body>
</html>
